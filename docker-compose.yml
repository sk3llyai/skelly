# Local development infrastructure.
# Postgres with the pgvector extension available (Skelly uses pgvector for similarity search).
# Start with:  pnpm db:up    Stop with:  pnpm db:down
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: skelly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skelly
      POSTGRES_PASSWORD: skelly
      POSTGRES_DB: skelly
    # Host port 5433 (not the default 5432) to avoid clashing with any other
    # local Postgres. Container still listens on 5432 internally.
    ports:
      - '5433:5432'
    volumes:
      - skelly-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skelly -d skelly']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  skelly-pgdata:
